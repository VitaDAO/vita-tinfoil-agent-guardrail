cvm-version: 0.7.1
cpus: 4
memory: 32768

containers:
  - name: "guardrail"
    # Image is automatically updated by the GitHub Actions workflow
    image: "ghcr.io/vitadao/vita-tinfoil-agent-guardrail:v0.1.0@sha256:3f184df2dc6c326cc33d9f932a6b6b188bec7472e819071ca9f2173e07321683"
    env:
      - PORT: "8000"
    secrets:
      - QMD_API_SECRET
    command: []

shim:
  upstream-port: 8000
  paths:
    - /classify
    - /health
